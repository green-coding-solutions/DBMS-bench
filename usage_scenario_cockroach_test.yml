---
name: HammerDB CockroachDB benchmark (minimal test)
author: Max Jahns
description: Minimal test - Benchmarks CockroachDB with HammerDB using TPC-C (1 warehouse, 1 VU, 1 min)
compose-file: !include compose.yml
services:
  postgres:
  mariadb:
  mysql:
  mssql:
  oracle:
    depends_on:
      cockroachdb:
        condition: service_started
flow:
  - name: Wait for CockroachDB
    container: hammerdb_container
    commands:
      - type: console
        note: Waiting for CockroachDB to be ready
        command: sleep 20
        shell: sh
        log-stdout: true
  - name: Build Warehouses
    container: hammerdb_container
    commands:
      - type: console
        note: RUN HAMMERDB BUILD
        command: ./hammerdbcli auto /tmp/repo/test/cockroach/cockroach_tprocc_buildschema.tcl | tee /dev/stderr | awk '/System achieved [0-9]+ NOPM/ { match($0, /System achieved [0-9]+ NOPM/); printf("GMT_SCI_R=%s\n", substr($0, RSTART+16, RLENGTH-21)) }'
        shell: sh
        log-stdout: true
        read-sci-stdout: true
  - name: Query Warehouses
    container: hammerdb_container
    commands:
      - type: console
        note: RUN HAMMERDB RUN
        command: ./hammerdbcli auto /tmp/repo/test/cockroach/cockroach_tprocc_run.tcl | tee /dev/stderr | awk '/System achieved [0-9]+ NOPM/ { match($0, /System achieved [0-9]+ NOPM/); printf("GMT_SCI_R=%s\n", substr($0, RSTART+16, RLENGTH-21)) }'
        shell: sh
        log-stdout: true
        read-sci-stdout: true
  - name: Drop Warehouses
    container: hammerdb_container
    commands:
      - type: console
        note: RUN HAMMERDB DROP
        command: ./hammerdbcli auto /tmp/repo/test/cockroach/cockroach_tprocc_deleteschema.tcl | tee /dev/stderr | awk '/System achieved [0-9]+ NOPM/ { match($0, /System achieved [0-9]+ NOPM/); printf("GMT_SCI_R=%s\n", substr($0, RSTART+16, RLENGTH-21)) }'
        shell: sh
        log-stdout: true
        read-sci-stdout: true
